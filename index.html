<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Denlam</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1>Denlam</h1>
      <nav>
        <ul>
          <li>Etude et Agencement</li>
          <li>Créations</li>
          <li>A propos de Thomas</li>
          <li>Contact</li>
          <li>Se connecter</li>
        </ul>
      </nav>
    </header>
    <main>
      <section>
        <h2>Etude et Agencement</h2>
      </section>
      <section>
        <h2>Créations</h2>
      </section>
      <section></section>
      <section id="contact">
        <div id="formulaire">
          <h2>Contactez-moi</h2>
          <form action="#" method="post" class="form">
            <div class="input-field">
              <input type="text" required autocomplete="off" />
              <label for="name">Nom</label>
            </div>
            <div class="input-field">
              <input type="email" required autocomplete="off" />
              <label for="email">Email</label>
            </div>
            <div class="input-field">
              <input type="tel" required autocomplete="off" />
              <label for="telephone">Numéro de téléphone</label>
            </div>
            <div class="input-field">
              <textarea
                name="message"
                id="message"
                cols="30"
                rows="10"
                required
              ></textarea>
              <label for="message">Votre message</label>
            </div>
            <label class="container_checkbox"
              >En cochant cette case, je consens à ce que mes informations
              soient utilisées afin de me contacter
              <input type="checkbox" required="required" />
              <span class="checkmark"></span>
            </label>
            <button class="btn">Envoyer</button>
          </form>
        </div>
        <div id="coordonnées">
          <h2>Mes Coordonnées</h2>
          <br />
          <p>17 place de la République</p>
          <p>72230 RUAUDIN</p>
          <br />
          <p>06.75.39.35.82</p>
          <br />
          <p>thomas.andre72@delam.com</p>
          <br />
          <div id="reseaux">
            <p>Suivez-moi sur mes réseaux :</p>
            <span>
              <a href="https://www.instagram.com/" target="_blank"
                ><i class="fa-brands fa-instagram"></i
              ></a>
              <a href="https://www.linkedin.com/" target="_blank"
                ><i class="fa-brands fa-linkedin"></i
              ></a>
              <a href="https://www.facebook.com/" target="_blank"
                ><i class="fa-brands fa-facebook"></i></a
            ></span>
          </div>
        </div>
      </section>
      <section id="login">
        <div>
          <!-- <h2>Se connecter</h2> -->
          <form action="" class="form">
            <div class="input-field">
              <input type="text" required autocomplete="off" />
              <label for="username">Nom d'utilisateur</label>
            </div>
            <div class="input-field">
              <input type="password" required autocomplete="off" />
              <label for="passeword">Mot de passe</label>
            </div>
            <button class="btn">Se connecter</button>
          </form>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
